# QUAN TRỌNG: Đổi giá trị app = "quanlykho-backend" thành tên app thực trên Fly.io
# Tạo app: fly apps create <app-name>
app = "quanlykho-backend"
primary_region = "sin"

[build]
  # Fly.io tự detect Dockerfile ở project root

[deploy]
  # Migration chạy MỘT LẦN trước khi deploy instances mới.
  # Nếu lệnh này fail → deploy bị hủy, instances cũ vẫn chạy bình thường.
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
